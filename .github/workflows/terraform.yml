name: Terraform

on:
  push:
    branches: [main]
    paths: ["infra/terraform/**", ".github/workflows/terraform.yml"]
  pull_request:
    branches: [main]
    paths: ["infra/terraform/**", ".github/workflows/terraform.yml"]

jobs:
  validate:
    name: fmt · validate · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform fmt -check -recursive

      # Validate each stack without a backend or cloud credentials.
      - name: Validate stacks
        run: |
          for dir in infra/terraform/layer1_persistent infra/terraform/layer2_ephemeral; do
            echo "== $dir =="
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate -no-color
          done

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint
        run: |
          tflint --init
          tflint --chdir infra/terraform --recursive -f compact

  # ---------------------------------------------------------------------------
  # Optional plan-on-PR via GitHub OIDC (no long-lived AWS keys). Enable by
  # configuring an IAM role that trusts this repo's OIDC provider and setting the
  # AWS_PLAN_ROLE_ARN + TF_STATE_BUCKET repository variables, then uncomment.
