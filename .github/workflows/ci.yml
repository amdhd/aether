name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      # pgvector image so the notes.embedding Vector column and cosine-distance
      # queries work; used only by the Postgres test leg below.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Generate a throwaway Fernet key per run instead of committing one to the
      # repo. Exported to $GITHUB_ENV so both test legs below inherit it.
      - name: Generate ephemeral test encryption key
        run: |
          echo "ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests (SQLite)
        run: pytest -q

      # Re-run the full suite against real Postgres + pgvector to cover the
      # dialect-specific SQL and the native vector-search path (the pgvector
      # tests are skipped on the SQLite leg above).
      - name: Run tests (Postgres + pgvector)
        env:
          # ENCRYPTION_KEY is inherited from $GITHUB_ENV (generated above).
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/aether_test
        run: pytest -q

  frontend:
    name: Frontend (lint + build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test
